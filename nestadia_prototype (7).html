const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
.nest *{box-sizing:border-box;margin:0;padding:0}
.nest{
  --paper:#F4F1E9; --card:#FCFBF6; --ink:#191C18; --soft:#5A5F55; --line:#DED7C7;
  --forest:#1C4A37; --forest2:#2E6B4F; --gold:#B5862E; --goldbg:#F3E9CE; --clay:#A6432E;
  --ledger:#15171C; --ledgerline:#2A2E36;
  font-family:'Hanken Grotesk',sans-serif; color:var(--ink); font-size:14px; line-height:1.45;
  background:radial-gradient(circle at 12% 0%, #fbf8ef 0%, transparent 45%),radial-gradient(circle at 100% 100%, #eef0e6 0%, transparent 40%), var(--paper);
  min-height:100%;
}
.nest b{font-weight:700}
.bar{display:flex;align-items:center;gap:16px;padding:12px 22px;border-bottom:1px solid var(--line);background:rgba(252,251,246,.7);backdrop-filter:blur(6px)}
.lockup{display:flex;align-items:center;gap:9px;background:var(--forest);border-radius:9px;padding:7px 13px 7px 10px}
.mark{width:23px;height:23px;flex:none}
.word{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:#fff;letter-spacing:.2px}
.tag{font-size:12px;color:var(--soft);letter-spacing:.3px}
.profilechip{margin-left:auto;font-size:12px;color:var(--soft);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:7px}
.profilechip b{color:var(--ink)} .muted2{opacity:.55}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot.ok{background:var(--forest2)}
.reset{display:flex;align-items:center;gap:5px;font-family:inherit;font-size:12px;color:var(--soft);background:none;border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer}
.reset:hover{color:var(--ink);border-color:var(--soft)}

.coach{display:flex;align-items:center;gap:14px;padding:10px 22px;background:var(--forest);color:#EAF2EC}
.coachbtn{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:#fff;font-family:inherit;font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.18s}
.coachbtn:hover{background:rgba(255,255,255,.16)}.coachbtn.done{cursor:default;background:rgba(255,255,255,.1)}
.coachlabel{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.7}.coachtext{opacity:.92}.go{opacity:.7}
.simnote{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-family:'IBM Plex Mono',monospace;opacity:.65}

.tabs{display:flex;gap:4px;padding:12px 18px 0;border-bottom:1px solid var(--line);background:rgba(252,251,246,.5)}
.tab{position:relative;display:flex;align-items:center;gap:9px;padding:11px 16px;border:1px solid transparent;border-bottom:none;border-radius:10px 10px 0 0;background:none;font-family:inherit;color:var(--soft);cursor:pointer;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--card);border-color:var(--line);color:var(--ink);box-shadow:0 -2px 0 var(--gold) inset}
.tl{display:flex;flex-direction:column;line-height:1.15;text-align:left;font-weight:600;font-size:13px}
.tl em{font-style:normal;font-weight:400;font-size:10.5px;color:var(--soft)}
.ping{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--gold);animation:ping 1.6s infinite}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(181,134,46,.5)}70%{box-shadow:0 0 0 7px rgba(181,134,46,0)}100%{box-shadow:0 0 0 0 rgba(181,134,46,0)}}

.body{display:grid;grid-template-columns:1fr 360px}
.stage{padding:26px 24px;min-height:560px}
.view{max-width:680px;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.vtitle{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin-bottom:8px}
.vlede{color:var(--soft);margin-bottom:18px;max-width:600px}.vlede.small{font-size:13px;margin-bottom:14px}.vlede em{font-style:italic;color:var(--ink)}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,.02),0 8px 24px -18px rgba(28,74,55,.25)}
.cardtop{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.ctitle{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.ctitle.small{font-size:13px;font-family:'Hanken Grotesk',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--soft);margin-bottom:12px}
.csub{color:var(--soft);font-size:13px;margin-top:2px}

.badges{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:20px;border:1px solid}
.badge.greda{background:var(--goldbg);border-color:#E2CF94;color:#7A5A14}
.badge.verified{background:#E1EFE6;border-color:#B6D6C2;color:var(--forest)}
.badge.submitted{background:#F1EEE6;border-color:var(--line);color:var(--soft)}

.docgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.docchip{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--soft);background:#F6F3EB;border:1px solid var(--line);border-radius:8px;padding:8px 10px}

function simHash(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  let a = (h >>> 0).toString(16).padStart(8, "0");
  let h2 = 0x12345678 ^ h;
  for (let i = str.length - 1; i >= 0; i--) { h2 ^= str.charCodeAt(i); h2 = Math.imul(h2, 0x01000193); }
  let b = (h2 >>> 0).toString(16).padStart(8, "0");
  return "sha256:" + a + b;
}
function simSig(payload, keyId) {
  let s = simHash(JSON.stringify(payload) + keyId).slice(7);
  while (s.length < 64) s += simHash(s).slice(7);
  return s.slice(0, 64);
}

const state = {

  busy: false, payloadOpen: null, view: "demo",

function tick(days = 0, mins = 8) {
  state.clock = new Date(state.clock.getTime() + days * 864e5 + mins * 6e4);
  return state.clock.toISOString();
}
function pushEvents(specs) {
  for (const s of specs) {
    const prevHash = state.ledger.length ? state.ledger[state.ledger.length - 1].hash : "sha256:GENESIS00000000";
    const seq = state.ledger.length + 1;
    const hash = simHash(prevHash + `${seq}|${s.type}|${s.actor}|${s.gate || ""}|${s.detail}`);
    state.ledger.push(Object.assign({ seq, prevHash, hash }, s));
  }
}

/* ───────────── derived ───────────── */
const curUnit = () => state.deal && UNITS.find((u) => u.id === state.deal.unitId);
const curGate = () => state.deal && state.deal.idx < state.deal.gates.length ? state.deal.gates[state.deal.idx] : null;
const releasedPct = () => state.deal ? state.deal.gates.reduce((a, g, i) => a + (g.status === "released" ? PROFILE.tranches[i] : 0), 0) : 0;

function prongStatus() {
  const d = state.deal, gate = curGate();
  const g1released = d && d.gates[0].status === "released";
  const p1 = state.devState === "verified" ? "done" : "active";
  let p2 = "locked";
  if (state.devState === "verified") p2 = g1released ? "done" : (d && d.spaIssued ? "waiting" : "active");
  let p3 = "locked";
  if (d) {
    const g5 = d.gates.find((g) => g.id === "G5");
    p3 = g5.status === "released" ? "done" : (gate && gate.id === "G5" && gate.status === "awaiting_attestation") ? "active" : "locked";
  }
  return { p1, p2, p3 };
}

function nextStep() {
  const d = state.deal, gate = curGate();
  if (state.devState === "unlisted") return { role: "developer", text: "List the development on the platform" };
  if (!d) return { role: "buyer", text: "Browse the listing and select a unit" };
  if (state.devState === "submitted" || state.devState === "verifying") return { role: "lawfirm", text: "Prong 1 · Run project verification" };
  if (state.devState === "verified" && !d.spaIssued) return { role: "lawfirm", text: "Prong 2 · Draft & issue the SPA" };
  if (!gate) return null;
  if (gate.status === "awaiting_buyer") return { role: "buyer", text: `Sign SPA & fund escrow (${gate.id})` };
  if (gate.status === "awaiting_evidence") return { role: "verifier", text: `Submit site evidence (${gate.id})` };
  if (gate.status === "awaiting_attestation")
    return gate.id === "G5"
      ? { role: "lawfirm", text: "Prong 3 · Execute deed, stamp duty & lodge" }
      : { role: "lawfirm", text: `Attest ${gate.id} — ${gate.label}` };
  if (gate.status === "awaiting_bank") return { role: "bank", text: `Verify signatures & release tranche (${gate.id})` };
  return null;
}

function selectUnit(id) {

function attest() {
  state.busy = true;
  const g = curGate(), isG5 = g.id === "G5";
  pushEvents([{ type: "attestation_requested", actor: "platform", gate: g.id, detail: `Engine requests attestation for ${g.id}`, ts: tick() }]);
  render();
  setTimeout(() => {
    if (isG5) {
      pushEvents([
        { type: "deed_executed", actor: "lawfirm", gate: "G5", detail: "Assignment / sub-lease (deed) executed — tenure within 50-yr ceiling", ts: tick(2) },
        { type: "stamp_duty_paid", actor: "lawfirm", gate: "G5", detail: "Stamp duty assessed & paid (required before registration)", ts: tick(3) },
        { type: "registry_lodgement", actor: "lawfirm", gate: "G5", detail: `Lodged at ${PROFILE.registry} for title registration`, ts: tick(5) },
      ]);
    }
    const scope = [];
    if (g.id === "G1") scope.push("executed_SPA", "buyer_KYC", "escrow_receipt");
    if (g.evidence) scope.push("field_evidence_" + g.id);
    if (state.deal.type === "completed" && g.id !== "G1" && !isG5) scope.push("registry_proof_" + g.id);
    if (isG5) scope.push("registered_sublease", "stamp_duty_receipt");
    const payload = {
      schema_version: "attestation/v1", deal_id: "GH-DEAL-" + state.deal.unitId, profile: "GH",
      gate_id: g.id, decision: "pass", artifact_set: scope.map((s) => ({ type: s, hash: simHash(s + g.id) })),
      lawyer: PROFILE.lawyer.lawyer, key_id: PROFILE.lawyer.key_id, nonce: nonce(), signed_at: tick(),
    };
    payload.signature = simSig(payload, PROFILE.lawyer.key_id);
    g.attestation = payload; g.status = "awaiting_bank";
    pushEvents([
      { type: "attestation_received", actor: "lawfirm", gate: g.id, detail: `Signed PASS · lawyer ${PROFILE.lawyer.lawyer} · ${scope.length} artifacts committed`, ts: tick() },
      { type: "attestation_accepted", actor: "platform", gate: g.id, detail: "7/7 engine checks passed (sig · key · state · hashes · nonce · skew)", ts: tick() },
    ]);
    state.busy = false; state.role = "bank"; render();
  }, 1300);
}

function bankRelease() {
  state.busy = true;
  const d = state.deal, u = curUnit(), g = curGate(), idx = d.idx;
  const amt = Math.round(u.ghs * PROFILE.tranches[idx] / 100);
  pushEvents([{ type: "bank_instruction_issued", actor: "platform", gate: g.id, detail: `Dual-signed release · ${PROFILE.tranches[idx]}% · ${ghs(amt)}`, ts: tick() }]);
  render();
  setTimeout(() => {
    pushEvents([
      { type: "bank_dual_signature_verified", actor: "bank", gate: g.id, detail: "Law-firm attestation + platform countersig verified independently", ts: tick() },
      { type: "bank_confirmation", actor: "bank", gate: g.id, detail: `Payout executed · ${ghs(amt)} → seller · schedule check OK`, ts: tick() },
    ]);
    g.status = "released";
    g.confirmation = { amt, ref: "FBG-" + nonce().slice(0, 8).toUpperCase() };
    g.at = state.clock.toISOString();
    const ni = d.idx + 1;
    if (ni < d.gates.length) {
      const ng = d.gates[ni];
      ng.status = ng.id === "G1" ? "awaiting_buyer"
        : (d.type === "off_plan" && ["G2", "G3", "G4"].includes(ng.id)) ? "awaiting_evidence" : "awaiting_attestation";
    } else {
      pushEvents([{ type: "deal_complete", actor: "platform", detail: "All gates released · title in buyer's name", ts: tick() }]);
    }
    d.idx = ni; state.busy = false; render();
  }, 1300);
}

/* ───────────── fail / cure one-pager ───────────── */
function failCureBriefHTML() {
  const unit = UNITS.find((u) => u.type === "off_plan");
  const g2pct = PROFILE.tranches[1];
  const g2amt = Math.round(unit.ghs * g2pct / 100);
  const escrowHeld = Math.round(unit.ghs * (100 - PROFILE.tranches[0]) / 100);

  const chainFrom = (prev, startSeq, rows) => {
    let p = prev, s = startSeq; const out = [];
    for (const r of rows) {
      s += 1;
      const hash = simHash(p + `${s}|${r.type}|${r.actor}|${r.gate || ""}|${r.detail}`);
      p = hash; out.push(Object.assign({}, r, { seq: s, hash }));
    }
    return { out, prev: p, seq: s };
  };
  const shared = chainFrom("sha256:GENESIS00000000", 10, [
    { actor: "verifier", gate: "G2", type: "platform_field_evidence_submitted", detail: "Signed site evidence · substructure: INCOMPLETE" },
    { actor: "platform", gate: "G2", type: "discrepancy_substantive", detail: "Field evidence conflicts with the claimed foundation milestone" },
    { actor: "lawfirm", gate: "G2", type: "attestation_received", detail: "Signed FAIL · binary decision · no tranche released", fail: true },
    { actor: "platform", gate: "G2", type: "cure_opened", detail: "Cure window opened · SLA clock started · escrow position unchanged" },
    { actor: "platform", gate: "G2", type: "m5_escalation", detail: "Delay surfaced on the buyer's M5 public timeline" },
  ]);
  const cured = chainFrom(shared.prev, shared.seq, [
    { actor: "verifier", gate: "G2", type: "platform_field_evidence_submitted", detail: "Re-verification · substructure: complete" },
    { actor: "lawfirm", gate: "G2", type: "attestation_received", detail: "Signed PASS · field evidence committed by hash" },
    { actor: "bank", gate: "G2", type: "bank_confirmation", detail: "Cure resolved · " + ghs(g2amt) + " released → seller" },
  ]).out;
  const aborted = chainFrom(shared.prev, shared.seq, [
    { actor: "platform", gate: "G2", type: "abort_triggered", detail: "Cure window expired · deal aborted under the SPA", abort: true },
    { actor: "bank", gate: "G2", type: "refund_executed", detail: "Refund waterfall · " + ghs(escrowHeld) + " returned to buyer", abort: true },
  ]).out;

  const steps = [
    { kind: "step", ic: "Building2", title: "Gate G2 reached", tag: "milestone", tagcls: "",
      text: "The off-plan deal arrives at the foundation milestone. The next " + g2pct + "% tranche (" + ghs(g2amt) + ") is pending — but nothing is released yet." },
    { kind: "step", ic: "Camera", title: "Field verification", tag: "evidence", tagcls: "",
      text: PROFILE.verifier.name + " visits the site and captures GPS-matched, timestamped photos, signed on capture. The verifier produces evidence — never a gate pass." },
    { kind: "fail", ic: "AlertTriangle", title: "Discrepancy → signed FAIL", tag: "fail", tagcls: "fail",
      text: "The evidence shows the substructure is incomplete, contradicting the developer's claim. The law firm cannot attest a pass, so it signs a FAIL with its per-lawyer key. The fail is itself committed to the ledger, and the gate is blocked." },
    { kind: "cure", ic: "RotateCcw", title: "Cure window opens", tag: "cure", tagcls: "cure",
      text: "The " + g2pct + "% stays in segregated escrow — no money moves on a fail. A cure window opens with an SLA clock, the developer is notified of the specific defect, and the M5 timeline shows the delay to the buyer instead of hiding it." },
    { kind: "step", ic: "Eye", title: "Re-verification", tag: "evidence", tagcls: "",
      text: "When the developer reports the work remedied, a fresh field verification re-runs the same gate with new signed evidence. The decision is binary, every time." },
  ];
  const stepsHTML = steps.map((s) => `<li class="opstep is-${s.kind}">
    <span class="opdot">${icon(s.ic, 17)}</span>
    <div class="opsbody">
      <div class="opshead"><b>${s.title}</b>${s.tag ? `<span class="optag ${s.tagcls}">${s.tag}</span>` : ""}</div>
      <div class="optext">${s.text}</div>
    </div>
  </li>`).join("");

  return `<div class="onepager">
    <div class="op-hero">
      <div class="op-kicker">Trust mechanism · failure handling</div>
      <h1 class="op-title">What happens when a gate fails</h1>
      <p class="op-sub">A failed check never moves money. It is signed, surfaced, and resolved in the open — the deal either cures and continues, or aborts to a full refund. There is no silent third path, and the audit record never shows a gap.</p>
      <div class="op-scenario">
        <span>Worked example</span>
        Off-plan unit ${unit.id} · Gate G2 — Foundation Complete · ${ghs(unit.ghs)} · <em>the field verifier's site evidence contradicts the developer's milestone claim.</em>
      </div>
    </div>

    <div class="op-h"><span class="ophn">1</span> The path, step by step</div>
    <ul class="opflow">${stepsHTML}</ul>

    <div class="opfork"><span class="opforkq">${icon("Hash", 13)} Remedied within the cure window?</span></div>
    <div class="opout">
      <div class="opcard good">
        <h4>${icon("CheckCircle2", 16)} Yes — cured, then released</h4>
        <p>The law firm signs a PASS. The bank independently verifies both signatures and the schedule, then releases the ${g2pct}% tranche (${ghs(g2amt)}) to the seller. The deal continues to G3, with the fail-and-cure permanently in its history.</p>
      </div>
      <div class="opcard bad">
        <h4>${icon("AlertTriangle", 16)} No — aborted, then refunded</h4>
        <p>The deal aborts under the SPA's terms. The escrow refund waterfall returns the buyer's held balance (${ghs(escrowHeld)}), less any contractually agreed costs. The matter closes with the full signed record intact.</p>
      </div>
    </div>

    <div class="op-h"><span class="ophn">2</span> Why the buyer is safe through all of this</div>
    <div class="opguard">
      <div class="gcard"><span class="gi">${icon("Lock", 16)}</span><h4>A fail never moves money</h4><p>Money moves only on a signed PASS plus an independent bank release. A fail leaves every held tranche exactly where it sits in escrow.</p></div>
      <div class="gcard"><span class="gi">${icon("Fingerprint", 16)}</span><h4>The fail is signed too</h4><p>A negative result is attested with the same key as a pass and committed to the hash-chained ledger. There is no silent decline — the record can never show a gap where a decision should be.</p></div>
      <div class="gcard"><span class="gi">${icon("ShieldCheck", 16)}</span><h4>Cure or abort — never limbo</h4><p>Once a fail is recorded the deal has exactly two terminal paths: remedied-and-released, or aborted-and-refunded. No off-ledger side arrangements.</p></div>
    </div>

    <div class="op-h"><span class="ophn">3</span> The same trail, as the ledger records it</div>
    <p class="op-note">Every step above writes an append-only, hash-chained event. Here is the exact sequence for the worked example — the shared path into the fail, then each of the two ways it can end.</p>
    <div class="opledger">
      ${shared.out.map(lrowHTML).join("")}
      <div class="opl-fork">
        <div class="opcol">
          <div class="opcolhead good">${icon("CheckCircle2", 13)} If remedied in time</div>
          ${cured.map(lrowHTML).join("")}
        </div>
        <div class="opcol">
          <div class="opcolhead bad">${icon("AlertTriangle", 13)} If the window lapses</div>
          ${aborted.map(lrowHTML).join("")}
        </div>
      </div>
    </div>

    <div class="op-h"><span class="ophn">4</span> The same machinery covers the other failure points</div>
    <div class="opalso">
      <div class="a"><b>Project verification fails at selection</b>The first buyer's selection triggers title and permit verification. If it fails, the listing is suspended before any escrow is funded — the buyer never reaches G1, and no money was ever at risk.</div>
      <div class="a"><b>Verifier and law firm disagree</b>If the field verifier's evidence and the law firm's own stream conflict, that discrepancy is itself a substantive event — it enters the identical cure-or-abort loop rather than being quietly reconciled.</div>
    </div>

    <div class="op-foot">${icon("Fingerprint", 12)} Signatures &amp; hashes simulated for demo · profile: Ghana · ${PROFILE.registry}</div>
  </div>`;
}

      <div class="seg">
        <button class="segbtn${state.view === "demo" ? " on" : ""}" data-act="view" data-arg="demo">${icon("Building2", 13)} Live demo</button>
        <button class="segbtn${state.view === "brief" ? " on" : ""}" data-act="view" data-arg="brief">${icon("ShieldCheck", 13)} Fail &amp; cure brief</button>
      </div>
      <span class="modehint">${state.view === "demo" ? "Interactive walkthrough of one clean deal, end to end" : "What happens when a check fails — a one-pager for partners"}</span>
    </div>
    ${state.view === "demo" ? demo : failCureBriefHTML()}`;

  document.getElementById("root").innerHTML = `<div class="nest">${body}</div>`;
}

/* ───────────── boot ───────────── */
(function boot() {
  const st = document.createElement("style");
  st.textContent = CSS;
  document.head.appendChild(st);

  document.getElementById("root").addEventListener("click", function (ev) {
    if (ev.target && ev.target.classList && ev.target.classList.contains("modalwrap")) { state.payloadOpen = null; render(); return; }
    const el = ev.target.closest ? ev.target.closest("[data-act]") : null;
    if (!el) return;
    const act = el.getAttribute("data-act");
    const arg = el.getAttribute("data-arg");
    if (act === "role") setRole(arg);
    else if (act === "view") setView(arg);
    else if (act === "reset") reset();
    else if (act === "list") listDevelopment();
    else if (act === "select") selectUnit(arg);
    else if (act === "verify") runProjectVerification();
    else if (act === "spa") draftSPA();
    else if (act === "fund") buyerFund();
    else if (act === "evidence") submitEvidence();
    else if (act === "attest") attest();
    else if (act === "release") bankRelease();
    else if (act === "payload") openPayload(arg);
    else if (act === "closepayload") { state.payloadOpen = null; render(); }
  });

  render();
})();

</script>
</body>
</html>
